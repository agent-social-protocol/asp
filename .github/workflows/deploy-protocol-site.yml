name: Deploy Protocol Site

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-protocol-site.yml
      - sites/agentsocialprotocol/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: protocol-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate protocol site entrypoint
        run: test -f sites/agentsocialprotocol/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload protocol site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sites/agentsocialprotocol

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
